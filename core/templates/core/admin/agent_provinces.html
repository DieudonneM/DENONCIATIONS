{% extends 'core/admin/base.html' %}

{% block admin_content %}
<div class="admin-header">
    <h1>{{ title }}</h1>
</div>

<div class="form-container">
    <div style="background: #f5f5f5; padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem;">
        <strong>Agent:</strong> {{ user.get_full_name }}<br>
        <strong>Email:</strong> {{ user.email }}
    </div>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>🗺️ Sélectionner les provinces assignées:</label>
            
            <div style="
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
                margin-top: 1rem;
            ">
                {% for province in form.provinces.field.queryset %}
                    <label style="
                        display: flex;
                        align-items: center;
                        gap: 0.5rem;
                        cursor: pointer;
                        padding: 0.75rem;
                        background: white;
                        border: 2px solid #ddd;
                        border-radius: 6px;
                        transition: all 0.3s ease;
                    "
                    onmouseover="this.style.borderColor='#2196F3'; this.style.background='#f5f5f5';"
                    onmouseout="this.style.borderColor='#ddd'; this.style.background='white';">
                        <input 
                            type="checkbox" 
                            name="provinces" 
                            value="{{ province.id }}"
                            {% if province in form.provinces.initial %}checked{% endif %}
                            style="cursor: pointer; width: 20px; height: 20px;">
                        <strong>{{ province.nom }}</strong><br>
                        <span style="font-size: 0.8rem; color: #999;">{{ province.code }}</span>
                    </label>
                {% endfor %}
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-save">💾 Enregistrer</button>
            <a href="{% url 'core:admin_users_list' %}" class="btn-cancel">Annuler</a>
        </div>
    </form>
</div>

{% endblock %}
