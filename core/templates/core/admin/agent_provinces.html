{% extends 'core/admin/base.html' %}

{% block admin_content %}
<div class="admin-header">
    <h1>{{ title }}</h1>
</div>

<div class="form-container">
    <div class="panel-muted">
        <strong>Agent:</strong> {{ user.get_full_name }}<br>
        <strong>Email:</strong> {{ user.email }}
    </div>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>🗺️ Sélectionner les provinces assignées:</label>
            
            <div class="grid-provinces">
                {% for province in form.provinces.field.queryset %}
                    <label class="province-card">
                        <input type="checkbox" name="provinces" value="{{ province.id }}" {% if province in form.provinces.initial %}checked{% endif %} class="checkbox-large">
                        <div>
                            <strong>{{ province.nom }}</strong><br>
                            <span class="muted small-muted">{{ province.code }}</span>
                        </div>
                    </label>
                {% endfor %}
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-save">💾 Enregistrer</button>
            <a href="{% url 'core:admin_users_list' %}" class="btn-cancel">Annuler</a>
        </div>
    </form>
</div>

{% endblock %}
